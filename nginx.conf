events {
    worker_connections 1024;
}

http {
    # =========================================================================
    # 1. СКРЫТИЕ ВЕРСИИ
    # =========================================================================
    server_tokens off;

    # =========================================================================
    # 2. ОГРАНИЧЕНИЯ
    # =========================================================================
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    large_client_header_buffers 4 16k;
    client_header_buffer_size 1k;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=payment_views_limit:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=vk_limit:10m rate=10r/s;

    # Connection Limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Блокировка ботов по User-Agent
    map $http_user_agent $blocked_ua {
        default 0;
        ~*libredtail-http 1;
        ~*zgrab 1;
        ~*masscan 1;
        ~*nmap 1;
        ~*ThinkPHP 1;
        ~*Go-http-client 1;
    }

    # =========================================================================
    # 3. РЕДИРЕКТ HTTP -> HTTPS
    # =========================================================================
    server {
        listen 80;
        server_name calendar2.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # =========================================================================
    # 4. ОСНОВНОЙ HTTPS СЕРВЕР
    # =========================================================================
    server {
        listen 443 ssl;
        server_name calendar2.duckdns.org;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;

        # SSL
        ssl_certificate     /etc/letsencrypt/live/calendar2.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/calendar2.duckdns.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Блокировка ботов
        if ($blocked_ua) {
            return 444;
        }

        # =====================================================================
        # 5. ЗАЩИТА ВЕБХУКА VK
        # =====================================================================
        location /vk/callback {
           # limit_req zone=vk_limit burst=20 nodelay;
           # limit_conn addr 10;

            proxy_pass http://127.0.0.1:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            client_max_body_size 2M;

            access_log /var/log/nginx/vk_callback_access.log;
            error_log /var/log/nginx/vk_callback_error.log;
        }

        # =====================================================================
        # 6. ОСНОВНОЕ ПРИЛОЖЕНИЕ
        # =====================================================================
        location / {
            limit_req zone=payment_views_limit burst=10 nodelay;
            limit_conn addr 10;

            proxy_pass http://127.0.0.1:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;


            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # =====================================================================
        # 7. HEALTH CHECK
        # =====================================================================
        location /nginx-health {
            access_log off;
            return 200 'nginx ok\n';
        }

        # =====================================================================
        # 8. LETSENCRYPT
        # =====================================================================
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }
    }
}